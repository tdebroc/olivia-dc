<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 720" width="1600" height="720" role="img" aria-label="Kering — Paris skyline at dusk">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a22"/>
      <stop offset="42%" stop-color="#2a2330"/>
      <stop offset="72%" stop-color="#52384a"/>
      <stop offset="100%" stop-color="#9a6a55"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e3cd9a"/>
      <stop offset="50%" stop-color="#c8a86a"/>
      <stop offset="100%" stop-color="#8c7330"/>
    </linearGradient>
    <linearGradient id="bld" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15131a"/>
      <stop offset="100%" stop-color="#0c0a10"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe9c2"/>
      <stop offset="40%" stop-color="#f3c98c"/>
      <stop offset="100%" stop-color="#9a6a55" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="2.2"/></filter>
  </defs>

  <!-- sky -->
  <rect width="1600" height="720" fill="url(#sky)"/>
  <circle cx="1180" cy="430" r="240" fill="url(#sun)" opacity="0.85"/>

  <!-- stars -->
  <g fill="#fff" opacity="0.7">
    <circle cx="160" cy="80" r="1.4"/><circle cx="320" cy="140" r="1"/><circle cx="500" cy="60" r="1.2"/>
    <circle cx="720" cy="110" r="1"/><circle cx="900" cy="70" r="1.3"/><circle cx="1080" cy="120" r="1"/>
    <circle cx="1320" cy="90" r="1.2"/><circle cx="1480" cy="150" r="1"/><circle cx="240" cy="200" r="1"/>
    <circle cx="640" cy="190" r="1.1"/><circle cx="1400" cy="220" r="1.1"/>
  </g>

  <!-- distant skyline -->
  <g fill="#20141d" opacity="0.85">
    <rect x="0" y="470" width="120" height="250"/>
    <rect x="120" y="500" width="90" height="220"/>
    <rect x="210" y="460" width="70" height="260"/>
    <rect x="1320" y="480" width="110" height="240"/>
    <rect x="1430" y="500" width="90" height="220"/>
    <rect x="1520" y="470" width="80" height="250"/>
  </g>

  <!-- Eiffel Tower -->
  <g stroke="url(#gold)" stroke-width="3" fill="none" opacity="0.95" transform="translate(760,150)">
    <!-- silhouette outline -->
    <path d="M40 0 L36 90 L20 240 L0 430 M40 0 L44 90 L60 240 L80 430" stroke-width="3.5"/>
    <!-- first platform -->
    <path d="M10 300 L70 300"/>
    <path d="M2 360 L78 360"/>
    <!-- legs base curves -->
    <path d="M0 430 C 8 360, 14 320, 20 240"/>
    <path d="M80 430 C 72 360, 66 320, 60 240"/>
    <!-- lattice hints -->
    <path d="M22 230 L58 230 M18 270 L62 270 M14 320 L66 320 M8 380 L72 380" stroke-width="1.6" opacity="0.7"/>
    <path d="M40 0 L40 430" stroke-width="1.4" opacity="0.5"/>
    <!-- top beacon -->
    <circle cx="40" cy="-4" r="3.5" fill="url(#gold)" stroke="none"/>
  </g>
  <g filter="url(#soft)" opacity="0.6">
    <circle cx="800" cy="146" r="6" fill="#ffe9c2"/>
  </g>

  <!-- Haussmann rooftops foreground -->
  <g fill="url(#bld)">
    <rect x="-20" y="560" width="1640" height="200"/>
    <!-- mansard roofs -->
    <path d="M40 560 L90 510 L150 560 Z"/>
    <path d="M200 560 L260 505 L330 560 Z"/>
    <path d="M380 560 L430 515 L500 560 Z"/>
    <path d="M1080 560 L1140 508 L1210 560 Z"/>
    <path d="M1260 560 L1320 512 L1390 560 Z"/>
    <path d="M1440 560 L1500 506 L1570 560 Z"/>
    <!-- chimneys -->
    <rect x="100" y="500" width="10" height="20"/><rect x="118" y="500" width="10" height="20"/>
    <rect x="280" y="498" width="10" height="22"/><rect x="298" y="498" width="10" height="22"/>
    <rect x="1150" y="500" width="10" height="20"/><rect x="1168" y="500" width="10" height="20"/>
    <rect x="1500" y="498" width="10" height="22"/><rect x="1518" y="498" width="10" height="22"/>
  </g>

  <!-- lit windows -->
  <g fill="#f3c98c" opacity="0.8">
    <rect x="60" y="590" width="8" height="14"/><rect x="84" y="590" width="8" height="14"/><rect x="108" y="590" width="8" height="14"/>
    <rect x="230" y="592" width="8" height="14"/><rect x="254" y="592" width="8" height="14"/>
    <rect x="420" y="590" width="8" height="14"/><rect x="444" y="590" width="8" height="14"/>
    <rect x="640" y="595" width="8" height="14"/><rect x="664" y="595" width="8" height="14"/><rect x="688" y="595" width="8" height="14"/>
    <rect x="980" y="592" width="8" height="14"/><rect x="1004" y="592" width="8" height="14"/>
    <rect x="1300" y="590" width="8" height="14"/><rect x="1324" y="590" width="8" height="14"/>
    <rect x="1470" y="592" width="8" height="14"/><rect x="1494" y="592" width="8" height="14"/>
  </g>

  <!-- KERING wordmark, bottom-left, refined serif tracking -->
  <g transform="translate(70,660)">
    <text x="0" y="0" font-family="Cormorant Garamond, Georgia, serif" font-size="46" letter-spacing="14" fill="url(#gold)" font-weight="600">KERING</text>
    <text x="4" y="30" font-family="Inter, Arial, sans-serif" font-size="12" letter-spacing="6" fill="#d8cdbb" opacity="0.85">EMPOWERING IMAGINATION</text>
  </g>
</svg>
